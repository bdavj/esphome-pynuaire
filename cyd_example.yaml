substitutions:
  device_name: drimaster

esphome:
  name: ${device_name}

# CYD = Cheap Yellow Display (ESP32-2432S028R)
# The standard example uses GPIO16/GPIO17 for UART, but on the CYD those
# pins are occupied by the onboard RGB LED (Green=GPIO16, Blue=GPIO17).
# Use GPIO22 (RX) and GPIO27 (TX) instead — both are free on the CYD.

esp32:
  board: esp32dev

# ----------------------------------------------------------------
# UART wired to the Nuaire Drimaster's internal UART bus.
# The signal is INVERTED — set inverted: true on both pins.
# Connect TX→RX and RX→TX between the CYD and the fan's
# controller board header.
#
# CYD pin  →  Fan header
# GPIO27   →  RX  (ESP TX → Fan RX)
# GPIO22   →  TX  (ESP RX → Fan TX)
# GND      →  GND
# 3.3V     →  3.3V (or separate power)
# ----------------------------------------------------------------
uart:
  tx_pin:
    number: GPIO27
    inverted: true
  rx_pin:
    number: GPIO22
    inverted: true
  baud_rate: 57600
  id: nuaire_uart

external_components:
  - source: github://bdavj/esphome-pynuaire
    components: [pynuaire]

fan:
  - platform: pynuaire
    uart_id: nuaire_uart
    name: "Drimaster Fan"
    id: drimaster_fan
    default_level: 3   # L1–L6 (default L3 — medium ventilation)

# Optional: expose individual speed levels as buttons in HA
# button:
#   - platform: template
#     name: "Drimaster Boost"
